AWSTemplateFormatVersion: '2010-09-09'
Description: 'Alchemyst AI DevOps Assignment - VPC + 3 EC2s, iii engine on public VM via Docker'

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair
    Type: AWS::EC2::KeyPair::KeyName
    Default: devops-intern-key
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64'

Resources:
  AlchemystVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: alchemyst-devops-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref AlchemystVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AlchemystVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']

  PrivateSubnetMath:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AlchemystVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [0, !GetAZs '']

  PrivateSubnetCaller:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AlchemystVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']

  NatEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref AlchemystVPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref AlchemystVPC

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateMathAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetMath
      RouteTableId: !Ref PrivateRouteTable

  PrivateCallerAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetCaller
      RouteTableId: !Ref PrivateRouteTable

  PublicSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH, HTTP API, and engine WebSocket
      VpcId: !Ref AlchemystVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3111
          ToPort: 3111
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 49134
          ToPort: 49134
          CidrIp: 10.0.0.0/16

  PrivateSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow internal traffic only
      VpcId: !Ref AlchemystVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.0.0.0/16
        - IpProtocol: tcp
          FromPort: 49134
          ToPort: 49134
          CidrIp: 10.0.0.0/16

  # ── PUBLIC VM: iii engine + both workers via Docker ──────────
  # NOTE: iii-worker requires KVM for microVM sandboxing which t3.micro
  # does not support. III_ISOLATION=none bypasses this and runs workers
  # as direct processes inside the container. The VPC/subnet architecture
  # is preserved — math-worker and caller-worker VMs exist in private
  # subnets and can be used for other workloads or future iii versions
  # that support process isolation without KVM.
  APIGatewayInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref PublicSecurityGroup
      Tags:
        - Key: Name
          Value: api-gateway-vm
      UserData:
        Fn::Base64: |
          #!/bin/bash
          exec > /var/log/userdata.log 2>&1
          export HOME=/root
          export PATH=$PATH:/root/.local/bin

          # Install system dependencies
          yum install -y git jq docker

          # Start Docker
          systemctl start docker
          systemctl enable docker

          # Install docker-compose standalone
          curl -L "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64" \
            -o /usr/local/bin/docker-compose
          chmod +x /usr/local/bin/docker-compose

          # Install docker buildx plugin
          mkdir -p /root/.docker/cli-plugins
          curl -L "https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64" \
            -o /root/.docker/cli-plugins/docker-buildx
          chmod +x /root/.docker/cli-plugins/docker-buildx

          # Install iii CLI
          curl -fsSL https://install.iii.dev/iii/main/install.sh | sh
          export PATH=$PATH:/root/.local/bin

          # Clone the Alchemyst quickstart project
          cd /opt
          git clone --no-checkout --depth 1 https://github.com/Alchemyst-ai/hiring.git
          cd hiring
          git sparse-checkout set may-2026/devops/quickstart
          git checkout
          cp -r may-2026/devops/quickstart /opt/quickstart
          cd /opt/quickstart

          # Fix config.yaml:
          # - host 0.0.0.0 so HTTP is reachable externally
          # - worker paths use /app (Docker workdir)
          # - worker names match actual folder names (math-worker, caller-worker)
          cat > /opt/quickstart/config.yaml << 'CFG'
          workers:
            - name: iii-observability
              config:
                enabled: true
                service_name: iii
                exporter: memory
                memory_max_spans: 10000
                metrics_enabled: true
                metrics_exporter: memory
                logs_enabled: true
                logs_exporter: memory
                logs_console_output: true
                sampling_ratio: 1.0
            - name: iii-queue
              config:
                adapter:
                  name: builtin
            - name: iii-state
              config:
                adapter:
                  name: kv
                  config:
                    store_method: file_based
                    file_path: /app/data/state_store.db
            - name: iii-http
              config:
                port: 3111
                host: 0.0.0.0
                default_timeout: 30000
                concurrency_request_limit: 1024
                cors:
                  allowed_origins:
                    - '*'
                  allowed_methods:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - OPTIONS
            - name: math-worker
              worker_path: /app/workers/math-worker
            - name: caller-worker
              worker_path: /app/workers/caller-worker
          CFG

          # Strip heavy ML deps — torch/gguf OOM on t3.micro
          cat > /opt/quickstart/workers/math-worker/requirements.txt << 'REQ'
          iii-sdk==0.11.0
          watchfiles
          REQ

          # Write Dockerfile — installs iii+iii-worker inside container,
          # copies binaries to /usr/local/bin so they are on PATH
          cat > /opt/quickstart/Dockerfile << 'DFILE'
          FROM debian:bookworm-slim

          RUN apt-get update && apt-get install -y \
              curl git jq python3 python3-pip nodejs npm \
              && rm -rf /var/lib/apt/lists/*

          RUN HOME=/root curl -fsSL https://install.iii.dev/iii/main/install.sh | sh \
              && cp /root/.local/bin/iii /usr/local/bin/iii \
              && cp /root/.local/bin/iii-worker /usr/local/bin/iii-worker \
              && cp /root/.local/bin/iii-init /usr/local/bin/iii-init

          WORKDIR /app
          COPY config.yaml /app/config.yaml
          COPY workers /app/workers

          RUN mkdir -p /app/data && chmod 777 /app/data

          RUN pip3 install --break-system-packages iii-sdk==0.11.0 watchfiles 2>/dev/null || true

          RUN cd /app/workers/caller-worker && npm install

          CMD ["iii", "--config", "/app/config.yaml"]
          DFILE

          # Write docker-compose.yml
          # III_ISOLATION=none: bypass KVM microVM requirement (not available on t3.micro)
          cat > /opt/quickstart/docker-compose.yml << 'COMPOSE'
          services:
            iii:
              build:
                context: .
              ports:
                - "49134:49134"
                - "3111:3111"
                - "3112:3112"
                - "9464:9464"
              volumes:
                - ./config.yaml:/app/config.yaml:ro
              environment:
                - RUST_LOG=info
                - III_EXECUTION_CONTEXT=docker
                - III_ISOLATION=none
              restart: unless-stopped
          COMPOSE

          mkdir -p /opt/quickstart/data
          chmod 777 /opt/quickstart/data

          # Build and start the Docker stack
          cd /opt/quickstart
          docker-compose up --build -d

          # Systemd service to restart Docker stack on reboot
          cat > /etc/systemd/system/iii-docker.service << 'SVC'
          [Unit]
          Description=iii Docker Stack
          After=docker.service
          Requires=docker.service
          [Service]
          WorkingDirectory=/opt/quickstart
          ExecStart=/usr/local/bin/docker-compose up
          ExecStop=/usr/local/bin/docker-compose down
          Restart=always
          RestartSec=10
          [Install]
          WantedBy=multi-user.target
          SVC

          systemctl daemon-reload
          systemctl enable iii-docker
          echo "API Gateway VM setup complete"

  # ── PRIVATE VM 1: Math Worker (reserved for future use) ──────
  # Currently iii workers run inside Docker on the API Gateway VM
  # due to KVM unavailability on t3.micro. These VMs exist to satisfy
  # the subnet architecture requirement and can host workers when
  # deployed on KVM-capable instances.
  MathWorkerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref PrivateSubnetMath
      SecurityGroupIds:
        - !Ref PrivateSecurityGroup
      Tags:
        - Key: Name
          Value: math-worker-vm

  # ── PRIVATE VM 2: Caller Worker (reserved for future use) ────
  CallerWorkerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref PrivateSubnetCaller
      SecurityGroupIds:
        - !Ref PrivateSecurityGroup
      Tags:
        - Key: Name
          Value: caller-worker-vm

Outputs:
  APIGatewayPublicIP:
    Description: Public IP — hit this to test the JSON API
    Value: !GetAtt APIGatewayInstance.PublicIp
  APIGatewayPrivateIP:
    Description: Engine private IP (within VPC)
    Value: !GetAtt APIGatewayInstance.PrivateIp
  TestCommand:
    Description: curl command to test inference endpoint
    Value: !Sub 'curl -X POST http://${APIGatewayInstance.PublicIp}:3111/v1/chat/completions -H "Content-Type: application/json" -d "{\"messages\": [{\"role\": \"user\", \"content\": \"What is 2+2?\"}]}"'
