AWSTemplateFormatVersion: '2010-09-09'
Description: 'Alchemyst AI DevOps Assignment - VPC + 3 EC2s, iii engine on public VM, workers on private VMs'

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair
    Type: AWS::EC2::KeyPair::KeyName
    Default: devops-intern-key
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64'

Resources:
  AlchemystVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: alchemyst-devops-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref AlchemystVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AlchemystVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']

  PrivateSubnetMath:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AlchemystVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [0, !GetAZs '']

  PrivateSubnetCaller:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AlchemystVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']

  NatEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref AlchemystVPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref AlchemystVPC

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateMathAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetMath
      RouteTableId: !Ref PrivateRouteTable

  PrivateCallerAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetCaller
      RouteTableId: !Ref PrivateRouteTable

  PublicSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH, HTTP API port, and engine WebSocket (VPC-internal only)
      VpcId: !Ref AlchemystVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3111
          ToPort: 3111
          CidrIp: 0.0.0.0/0
        # Engine WebSocket port - only reachable from within the VPC (private worker VMs)
        - IpProtocol: tcp
          FromPort: 49134
          ToPort: 49134
          CidrIp: 10.0.0.0/16

  PrivateSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and engine WebSocket from within the VPC only
      VpcId: !Ref AlchemystVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.0.0.0/16
        - IpProtocol: tcp
          FromPort: 49134
          ToPort: 49134
          CidrIp: 10.0.0.0/16

  # ── PUBLIC VM: iii Engine + iii-http worker ───────────────────────────────
  # Runs the iii engine natively (no Docker needed here). The config.yaml is
  # patched to bind iii-http on 0.0.0.0:3111 so the JSON API is externally
  # reachable. The engine WebSocket (port 49134) is bound to 0.0.0.0 but the
  # security group restricts it to 10.0.0.0/16 so only the private VMs can
  # connect workers to it.
  APIGatewayInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref PublicSecurityGroup
      Tags:
        - Key: Name
          Value: api-gateway-vm
      UserData:
        Fn::Base64: |
          #!/bin/bash
          exec > /var/log/userdata.log 2>&1
          set -e
          export HOME=/root
          export PATH=$PATH:/root/.local/bin

          yum install -y git jq

          # Install iii CLI
          curl -fsSL https://install.iii.dev/iii/main/install.sh | sh
          export PATH=$PATH:/root/.local/bin

          # Clone only the quickstart subdirectory
          cd /opt
          git clone --no-checkout --depth 1 https://github.com/Alchemyst-ai/hiring.git
          cd hiring
          git sparse-checkout set may-2026/devops/quickstart
          git checkout
          cp -r may-2026/devops/quickstart /opt/quickstart
          cd /opt/quickstart

          # Patch config.yaml:
          # - iii-http binds on 0.0.0.0 so port 3111 is reachable externally
          # - remove the math-worker and caller-worker entries; those run on
          #   their own private VMs and connect to the engine via WebSocket
          python3 - << 'PY'
          import re, pathlib
          p = pathlib.Path('/opt/quickstart/config.yaml')
          cfg = p.read_text()
          # Bind HTTP on all interfaces
          cfg = cfg.replace('host: 127.0.0.1', 'host: 0.0.0.0')
          cfg = cfg.replace("host: '127.0.0.1'", "host: '0.0.0.0'")
          # Remove worker sections for math-worker and caller-worker
          # They register themselves remotely, so we only keep iii-built-in workers here
          cfg = re.sub(
              r'\n\s*- name: (math-worker|caller-worker)\s*\n(\s+worker_path:[^\n]*\n)+',
              '\n',
              cfg
          )
          p.write_text(cfg)
          PY

          # Systemd service for iii engine
          cat > /etc/systemd/system/iii-engine.service << 'SVC'
          [Unit]
          Description=iii Engine
          After=network.target
          [Service]
          WorkingDirectory=/opt/quickstart
          ExecStart=/root/.local/bin/iii --config /opt/quickstart/config.yaml
          Restart=always
          RestartSec=5
          Environment=HOME=/root
          Environment=PATH=/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin
          [Install]
          WantedBy=multi-user.target
          SVC

          systemctl daemon-reload
          systemctl enable iii-engine
          systemctl start iii-engine
          echo "API Gateway VM setup complete"

  # ── PRIVATE VM 1: Python Math Worker ─────────────────────────────────────
  # Connects back to the engine on the public VM via WebSocket (III_URL).
  #
  # Blockers addressed:
  #   1. pypi.iii.dev expired SSL cert — pip is told to trust the host
  #      with --trusted-host so it skips certificate verification for that
  #      index only. This is safe because we are explicitly targeting the
  #      iii-specific package index, not the broader PyPI.
  #   2. KVM unavailable on t3.micro — III_ISOLATION=none is set in the
  #      systemd unit so iii-worker runs the worker as a direct process
  #      instead of launching a microVM sandbox.
  #   3. torch/gguf OOM on t3.micro (1 GB RAM) — requirements.txt is
  #      overwritten to keep only iii-sdk and watchfiles.
  MathWorkerInstance:
    Type: AWS::EC2::Instance
    DependsOn: APIGatewayInstance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref PrivateSubnetMath
      SecurityGroupIds:
        - !Ref PrivateSecurityGroup
      Tags:
        - Key: Name
          Value: math-worker-vm
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            exec > /var/log/userdata.log 2>&1
            set -e
            export HOME=/root
            export PATH=${!PATH}:/root/.local/bin

            yum install -y git python3 python3-pip

            # Install iii CLI + iii-worker binary
            curl -fsSL https://install.iii.dev/iii/main/install.sh | sh
            export PATH=${!PATH}:/root/.local/bin

            # Clone quickstart
            cd /opt
            git clone --no-checkout --depth 1 https://github.com/Alchemyst-ai/hiring.git
            cd hiring
            git sparse-checkout set may-2026/devops/quickstart
            git checkout
            cp -r may-2026/devops/quickstart /opt/quickstart

            # Strip heavy ML deps that OOM on t3.micro (torch, gguf).
            # iii-sdk is installed via the iii custom index; --trusted-host bypasses
            # the expired SSL certificate on pypi.iii.dev without disabling TLS globally.
            cat > /opt/quickstart/workers/math-worker/requirements.txt << 'REQ'
            iii-sdk==0.11.0
            watchfiles
            REQ

            pip3 install \
              --index-url https://pypi.iii.dev/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              --trusted-host pypi.iii.dev \
              -r /opt/quickstart/workers/math-worker/requirements.txt

            # Systemd service — III_URL uses the engine private IP injected by CloudFormation.
            # III_ISOLATION=none bypasses the KVM microVM requirement.
            # ${!...} syntax escapes bash variables so CloudFormation does not try to resolve them.
            cat > /etc/systemd/system/math-worker.service << 'SVC'
            [Unit]
            Description=iii Math Worker
            After=network.target
            [Service]
            WorkingDirectory=/opt/quickstart/workers/math-worker
            ExecStart=/root/.local/bin/iii-worker
            Restart=always
            RestartSec=10
            Environment=HOME=/root
            Environment=PATH=/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin
            Environment=III_URL=ws://${APIGatewayInstance.PrivateIp}:49134
            Environment=III_ISOLATION=none
            [Install]
            WantedBy=multi-user.target
            SVC

            systemctl daemon-reload
            systemctl enable math-worker
            systemctl start math-worker
            echo "Math Worker VM setup complete"

  # ── PRIVATE VM 2: TypeScript Caller Worker ────────────────────────────────
  # Same engine connection pattern as the math worker. Node/npm have no cert
  # issues so installation is straightforward. III_ISOLATION=none is still
  # required to bypass the KVM check on t3.micro.
  CallerWorkerInstance:
    Type: AWS::EC2::Instance
    DependsOn: APIGatewayInstance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref PrivateSubnetCaller
      SecurityGroupIds:
        - !Ref PrivateSecurityGroup
      Tags:
        - Key: Name
          Value: caller-worker-vm
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            exec > /var/log/userdata.log 2>&1
            set -e
            export HOME=/root
            export PATH=$PATH:/root/.local/bin

            yum install -y git

            # Install Node.js 20
            curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
            yum install -y nodejs

            # Install iii CLI + iii-worker binary
            curl -fsSL https://install.iii.dev/iii/main/install.sh | sh
            export PATH=$PATH:/root/.local/bin

            # Clone quickstart
            cd /opt
            git clone --no-checkout --depth 1 https://github.com/Alchemyst-ai/hiring.git
            cd hiring
            git sparse-checkout set may-2026/devops/quickstart
            git checkout
            cp -r may-2026/devops/quickstart /opt/quickstart

            # Install TypeScript worker dependencies
            cd /opt/quickstart/workers/caller-worker
            npm install

            # Systemd service — III_URL uses the engine private IP injected by CloudFormation.
            # III_ISOLATION=none bypasses the KVM microVM requirement.
            cat > /etc/systemd/system/caller-worker.service << 'SVC'
            [Unit]
            Description=iii Caller Worker
            After=network.target
            [Service]
            WorkingDirectory=/opt/quickstart/workers/caller-worker
            ExecStart=/root/.local/bin/iii-worker
            Restart=always
            RestartSec=10
            Environment=HOME=/root
            Environment=PATH=/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin
            Environment=III_URL=ws://${APIGatewayInstance.PrivateIp}:49134
            Environment=III_ISOLATION=none
            [Install]
            WantedBy=multi-user.target
            SVC

            systemctl daemon-reload
            systemctl enable caller-worker
            systemctl start caller-worker
            echo "Caller Worker VM setup complete"

Outputs:
  APIGatewayPublicIP:
    Description: Public IP — hit this to test the JSON API
    Value: !GetAtt APIGatewayInstance.PublicIp
  APIGatewayPrivateIP:
    Description: Engine private IP (used by worker VMs to connect via WebSocket)
    Value: !GetAtt APIGatewayInstance.PrivateIp
  MathWorkerPrivateIP:
    Description: Math worker VM private IP
    Value: !GetAtt MathWorkerInstance.PrivateIp
  CallerWorkerPrivateIP:
    Description: Caller worker VM private IP
    Value: !GetAtt CallerWorkerInstance.PrivateIp
  TestCommand:
    Description: curl command to test inference endpoint
    Value: !Sub 'curl -X POST http://${APIGatewayInstance.PublicIp}:3111/v1/chat/completions -H "Content-Type: application/json" -d "{\"messages\": [{\"role\": \"user\", \"content\": \"What is 2+2?\"}]}"'
